apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: nginx
        image: variantcourselabsacr.azurecr.io/excercises-mom-0-test-0-1-dockerbuild:103840a7119d56e6538d8e2b87a0b2fd3129aefb
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-svc
spec:
  selector:
    app: my-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-ing
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-lab

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - #Your hostname here! must end in .course.variant.dev
    secretName: my-app-tls
  rules:
    - host: #Your hostname here! must end in .course.variant.dev
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: my-app-svc
              port:
                number: 80