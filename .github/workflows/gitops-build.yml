name: GitOps - Build and Deploy Images

on:
  push:
    branches:
      - main
    paths:
      - '**/Dockerfile'
      - '**/deployment.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[auto]')
    outputs:
      folders: ${{ steps.changed-dirs.outputs.all_changed_files }}
      has_changes: ${{ steps.changed-dirs.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed directories
        id: changed-dirs
        uses: tj-actions/changed-files@v45
        with:
          dir_names: true
          dir_names_max_depth: 4
          files: |
            **/Dockerfile
          files_ignore: |
            **/_*/**
          json: true
          escape_json: false

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.detect-changes.outputs.folders) }}
    
    # Per-folder concurrency - only cancels builds for the SAME folder
    concurrency:
      group: build-${{ matrix.folder }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanitize folder name for branch/tag
        id: sanitize
        run: |
          # Convert folder path to valid branch/tag name
          # Replace / with - and remove leading/trailing dashes
          sanitized=$(echo "${{ matrix.folder }}" | sed 's|/|-|g' | sed 's|^-||' | sed 's|-$||')
          echo "folder_sanitized=$sanitized" >> $GITHUB_OUTPUT
          echo "Sanitized folder name: $sanitized"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.folder }}
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ steps.sanitize.outputs.folder_sanitized }}:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ steps.sanitize.outputs.folder_sanitized }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment.yml with new image tag
        run: |
          IMAGE_TAG="${{ vars.ACR_LOGIN_SERVER }}/${{ steps.sanitize.outputs.folder_sanitized }}:${{ github.sha }}"
          DEPLOYMENT_FILE="${{ matrix.folder }}/deployment.yml"
          
          echo "Updating image in $DEPLOYMENT_FILE to: $IMAGE_TAG"
          
          # Update the image line in deployment.yml
          # Matches "image: <anything>" and replaces with new tag
          sed -i "s|image:.*|image: $IMAGE_TAG|g" "$DEPLOYMENT_FILE"
          
          echo "Updated deployment.yml:"
          cat "$DEPLOYMENT_FILE"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "[auto] Update image tag for ${{ matrix.folder }}"
          branch: auto/image-update/${{ steps.sanitize.outputs.folder_sanitized }}
          delete-branch: true
          title: "🐳 Update image: ${{ matrix.folder }}"
          body: |
            ## Automated Image Update
            
            This PR was automatically generated by the GitOps workflow.
            
            **Folder:** `${{ matrix.folder }}`
            **New Image:** `${{ vars.ACR_LOGIN_SERVER }}/${{ steps.sanitize.outputs.folder_sanitized }}:${{ github.sha }}`
            **Commit:** ${{ github.sha }}
            
            ### Changes
            - Updated `deployment.yml` with the new image tag
            
            ---
            *This PR will be automatically updated if new changes are pushed to the same folder.*
            *Previous PRs for this folder are superseded by this one.*
          labels: |
            auto-generated
            image-update
          assignees: ${{ github.actor }}
